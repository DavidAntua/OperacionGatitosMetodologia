<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Adopción de Gatos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Sistema de Gatos en Adopción</h1>

<form id="formGato">
    <input type="hidden" id="idGato">

    <input type="text" id="nombre" placeholder="Nombre" required>
    <input type="text" id="raza" placeholder="Raza" required>
    <input type="text" id="edad" placeholder="Edad" required>

    <button type="submit">Guardar gato</button>
</form>

<h2>Lista de gatos</h2>
<div id="listaGatos"></div>

<script>
const form = document.getElementById('formGato');

// GUARDAR / EDITAR GATO
form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const datos = new FormData();       
    const id = document.getElementById('idGato').value;

    // Aquí se envían las claves exactas que espera el PHP: nombre, raza, edad
    datos.append('id', id);
    datos.append('nombre', document.getElementById('nombre').value);
    datos.append('raza', document.getElementById('raza').value);
    datos.append('edad', document.getElementById('edad').value);

    // Se asume que renombrarás tus otros archivos PHP correspondientes
    let url = id ? 'editar_gato.php' : 'guardar_libro.php'; 

    await fetch(url, {
        method: 'POST',
        body: datos
    });

    form.reset();
    document.getElementById('idGato').value = '';
    cargarGatos();
});

// CARGAR GATOS
async function cargarGatos(){
    // Cambiado a obtener_gatos.php para seguir la lógica del sistema
    const respuesta = await fetch('obtener_libros.php');
    const gatos = await respuesta.json();

    let html = '';

    gatos.forEach(gato => {
        html += `
            <div class="card">
                <h3>${gato.nombre}</h3>
                <p><b>Raza:</b> ${gato.raza}</p>
                <p><b>Edad:</b> ${gato.edad}</p>

                <button onclick="editarGato(
                    ${gato.id},
                    '${gato.nombre}',
                    '${gato.raza}',
                    '${gato.edad}'
                )">
                    Editar
                </button>

                <button onclick="eliminarGato(${gato.id})">
                    Eliminar
                </button>
            </div>
        `;
    });

    document.getElementById('listaGatos').innerHTML = html;
}

// ELIMINAR GATO
function eliminarGato(id){
    const datos = new FormData();
    datos.append('id', id);

    fetch('eliminar_gato.php', {
        method: 'POST',
        body: datos
    })
    .then(res => res.text())
    .then(() => cargarGatos());
}

// EDITAR GATO (llenar formulario)
function editarGato(id, nombre, raza, edad){
    document.getElementById('idGato').value = id;
    document.getElementById('nombre').value = nombre;
    document.getElementById('raza').value = raza;
    document.getElementById('edad').value = edad;
}

// Iniciar aplicación
cargarGatos();
</script>

</body>
</html>
